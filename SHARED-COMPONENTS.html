<!-- ═══════════════════════════════════════════════════════
     RELIABLE PROGRAMMES/COURSES DROPDOWN (CSS + JS)
     
     Fixes unstable hover-based dropdowns: moving the mouse
     diagonally from the button to the panel drops out of the
     hover zone and closes it early, and there's no real hover
     state on tablets at all. This replaces hover with
     click-to-toggle, which works the same way on desktop
     and touch.
     
     ADD THE CSS BELOW TO: css/global.css
     ADD THE JS BELOW TO:  js/global.js
     Once both are in the shared files, every page that uses
     the standard nav markup above gets this automatically —
     no more per-page patching needed.
     ═══════════════════════════════════════════════════════ -->
<!--
CSS (add to css/global.css):

.nav-item{position:relative}
.nav-link[data-dropdown]{display:flex;align-items:center;gap:6px;cursor:pointer;background:none;border:none;font:inherit;padding:inherit}
.nav-caret{transition:transform .2s ease}
.nav-item.dropdown-open .nav-caret{transform:rotate(180deg)}
.nav-dropdown{
  position:absolute;top:100%;left:50%;
  transform:translateX(-50%) translateY(6px);
  min-width:250px;background:#fff;
  border:1px solid rgba(201,158,44,.22);
  border-radius:10px;
  box-shadow:0 14px 36px rgba(0,0,0,.14);
  padding:10px;display:flex;flex-direction:column;
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity .16s ease,transform .16s ease,visibility .16s;
  z-index:300;
}
.nav-dropdown.open{opacity:1;visibility:visible;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.nav-dropdown a{display:block;padding:9px 12px;border-radius:6px;color:var(--ink);font-size:13.5px;text-decoration:none;transition:background .15s}
.nav-dropdown a:hover{background:rgba(201,158,44,.08)}

JS (add to js/global.js):

(function(){
  function closeAll(){
    document.querySelectorAll('.nav-item.dropdown-open').forEach(function(item){
      item.classList.remove('dropdown-open');
      var panel = item.querySelector('.nav-dropdown');
      var btn = item.querySelector('[data-dropdown]');
      if(panel) panel.classList.remove('open');
      if(btn) btn.setAttribute('aria-expanded','false');
    });
  }
  document.querySelectorAll('[data-dropdown]').forEach(function(btn){
    var item = btn.closest('.nav-item');
    var panel = item ? item.querySelector('.nav-dropdown') : null;
    if(!item || !panel) return;
    btn.setAttribute('aria-expanded','false');
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var wasOpen = item.classList.contains('dropdown-open');
      closeAll();
      if(!wasOpen){
        item.classList.add('dropdown-open');
        panel.classList.add('open');
        btn.setAttribute('aria-expanded','true');
      }
    });
  });
  document.addEventListener('click', closeAll);
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeAll(); });
})();
-->
