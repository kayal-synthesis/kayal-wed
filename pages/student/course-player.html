<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1208;--terra:#b5622a;--terra-l:#c8923a;--terra-dim:#a0551f;
  --linen:#faf7f2;--cream:#e8ddd4;--parchment:#f8f4ee;--stone:#806858;
  --slate:#5a4a3a;--white:#ffffff;
  --player-sidebar:320px;--topbar-h:56px;
  --ff-display:'Georgia',serif;--ff-heading:'Georgia',serif;--ff-body:'Inter',-apple-system,sans-serif;
  --r:8px;--r-lg:14px;
}
body{font-family:var(--ff-body);background:#0e0a04;color:var(--linen);display:flex;flex-direction:column;min-height:100vh}

/* ── TOP BAR ──────────────────────────────────────────────── */
.player-topbar{height:var(--topbar-h);background:rgba(14,10,4,.95);border-bottom:1px solid rgba(250,247,242,.06);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.ptb-left{display:flex;align-items:center;gap:14px}
.ptb-back{display:flex;align-items:center;gap:7px;font-size:12.5px;color:rgba(250,247,242,.4);text-decoration:none;transition:color .2s}
.ptb-back:hover{color:rgba(250,247,242,.8)}
.ptb-sep{color:rgba(250,247,242,.15);font-size:14px}
.ptb-prog-name{font-size:13px;font-weight:600;color:rgba(250,247,242,.7)}
.ptb-module-name{font-size:12.5px;color:rgba(250,247,242,.4);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ptb-right{display:flex;align-items:center;gap:12px}
.ptb-progress{display:flex;align-items:center;gap:8px;font-size:11.5px;color:rgba(250,247,242,.4)}
.ptb-progress-bar{width:80px;height:4px;background:rgba(250,247,242,.1);border-radius:2px}
.ptb-progress-fill{height:100%;background:var(--terra);border-radius:2px;transition:width .4s}

/* ── LAYOUT ───────────────────────────────────────────────── */
.player-layout{display:grid;grid-template-columns:1fr var(--player-sidebar);flex:1;min-height:calc(100vh - var(--topbar-h))}

/* ── VIDEO PANEL ──────────────────────────────────────────── */
.video-panel{background:#000;display:flex;flex-direction:column}

/* Video area */
.video-area{position:relative;background:#000}
.video-ratio{aspect-ratio:16/9;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
.video-iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

/* Coming soon / placeholder */
.video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:linear-gradient(135deg,#0e0a04,#1a1006);text-align:center;padding:40px}
.video-placeholder-icon{font-size:64px;opacity:.3}
.video-placeholder h3{font-family:var(--ff-display);font-size:24px;font-weight:300;color:rgba(250,247,242,.7)}
.video-placeholder p{font-family:var(--ff-heading);font-size:14px;font-style:italic;color:rgba(250,247,242,.35);max-width:360px;line-height:1.7}

/* Video info bar */
.video-info{background:#0e0a04;border-top:1px solid rgba(250,247,242,.06);padding:20px 24px}
.vi-classes-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.vi-class-btn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid rgba(250,247,242,.15);background:rgba(250,247,242,.05);color:rgba(250,247,242,.6)}
.vi-class-btn.active{background:var(--terra);border-color:var(--terra);color:white}
.vi-class-btn:hover:not(.active){border-color:rgba(250,247,242,.35);color:rgba(250,247,242,.9)}
.vi-class-btn.watched-done{border-color:#16a34a;color:#4ade80;background:rgba(22,163,74,.08)}
.vi-class-btn.watched-done.active{background:#16a34a;color:white}

.vi-module-title{font-family:var(--ff-display);font-size:22px;font-weight:300;color:var(--linen);line-height:1.2;margin-bottom:6px}
.vi-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.vi-meta-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:rgba(250,247,242,.4)}
.vi-desc{font-family:var(--ff-heading);font-size:14px;font-style:italic;color:rgba(250,247,242,.55);line-height:1.7;margin-bottom:20px}

/* Actions */
.vi-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.vi-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
.vi-btn-primary{background:var(--terra);color:white}.vi-btn-primary:hover{background:var(--terra-dim)}
.vi-btn-outline{background:rgba(250,247,242,.06);color:rgba(250,247,242,.7);border:1px solid rgba(250,247,242,.12)}.vi-btn-outline:hover{border-color:rgba(250,247,242,.3);color:var(--linen)}
.vi-btn-watched{background:#16a34a;color:white}.vi-btn-watched:hover{background:#15803d}
.vi-btn:disabled{opacity:.5;cursor:not-allowed}

/* Notes area */
.vi-notes-wrap{margin-top:20px;padding-top:20px;border-top:1px solid rgba(250,247,242,.06)}
.vi-notes-label{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(250,247,242,.3);margin-bottom:8px}
.vi-notes{width:100%;background:rgba(250,247,242,.04);border:1px solid rgba(250,247,242,.08);border-radius:var(--r);padding:12px 14px;font-family:var(--ff-heading);font-size:13.5px;font-style:italic;color:rgba(250,247,242,.7);resize:vertical;min-height:80px;line-height:1.6;outline:none;transition:border-color .2s}
.vi-notes::placeholder{color:rgba(250,247,242,.2)}
.vi-notes:focus{border-color:rgba(181,98,42,.4)}
.vi-notes-save{margin-top:8px;font-size:11.5px;color:rgba(250,247,242,.3);background:none;border:none;cursor:pointer;padding:4px 0;transition:color .2s}
.vi-notes-save:hover{color:var(--terra-l)}

/* ── MODULE SIDEBAR ───────────────────────────────────────── */
.module-sidebar{background:rgba(250,247,242,.02);border-left:1px solid rgba(250,247,242,.06);display:flex;flex-direction:column;overflow:hidden}
.ms-header{padding:16px 18px;border-bottom:1px solid rgba(250,247,242,.06);flex-shrink:0}
.ms-prog-name{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(250,247,242,.35);margin-bottom:4px}
.ms-title{font-family:var(--ff-heading);font-size:14px;font-weight:600;color:var(--linen)}
.ms-progress{margin-top:10px;display:flex;align-items:center;gap:8px}
.ms-progress-bar{flex:1;height:4px;background:rgba(250,247,242,.1);border-radius:2px}
.ms-progress-fill{height:100%;background:var(--terra);border-radius:2px;transition:width .5s}
.ms-progress-pct{font-size:10px;color:rgba(250,247,242,.4);min-width:28px;text-align:right}

/* Module scroll list */
.ms-list{flex:1;overflow-y:auto;padding:8px 0}
.ms-list::-webkit-scrollbar{width:4px}
.ms-list::-webkit-scrollbar-track{background:transparent}
.ms-list::-webkit-scrollbar-thumb{background:rgba(250,247,242,.1);border-radius:2px}

.ms-week-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(250,247,242,.25);padding:12px 18px 6px;font-weight:600}
.ms-module{display:flex;align-items:flex-start;gap:10px;padding:10px 18px;cursor:pointer;transition:background .15s}
.ms-module:hover:not(.locked){background:rgba(250,247,242,.04)}
.ms-module.active-module{background:rgba(181,98,42,.1);border-right:2px solid var(--terra)}
.ms-module.locked{cursor:not-allowed;opacity:.45}
.ms-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;margin-top:1px}
.ms-dot.watched{background:#dcfce7;color:#16a34a}
.ms-dot.available{background:#dbeafe;color:#2563eb}
.ms-dot.new{background:rgba(181,98,42,.2);color:var(--terra-l)}
.ms-dot.locked{background:rgba(250,247,242,.06);color:rgba(250,247,242,.25)}
.ms-module-body{}
.ms-module-title{font-size:12px;font-weight:600;color:rgba(250,247,242,.8);line-height:1.3}
.ms-module-meta{font-size:10.5px;color:rgba(250,247,242,.35);margin-top:2px}
.ms-module-new{font-size:8.5px;font-weight:700;background:rgba(181,98,42,.2);color:var(--terra-l);padding:1px 6px;border-radius:10px;margin-left:4px;vertical-align:middle}

/* ── TOAST ────────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(14,10,4,.97);border:1px solid rgba(181,98,42,.3);color:var(--linen);padding:11px 22px;border-radius:24px;font-size:12.5px;font-weight:500;z-index:300;opacity:0;pointer-events:none;transition:all .3s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media(max-width:900px){
  .player-layout{grid-template-columns:1fr}
  .module-sidebar{display:none}
}
</style>
</head>
<body>

<!-- Top bar -->
<header class="player-topbar">
  <div class="ptb-left">
    <a href="dashboard.html" class="ptb-back"><i class="fas fa-arrow-left"></i> Dashboard</a>
    <span class="ptb-sep">/</span>
    <span class="ptb-prog-name" id="ptb-prog-name">…</span>
    <span class="ptb-sep">/</span>
    <span class="ptb-module-name" id="ptb-module-name">…</span>
  </div>
  <div class="ptb-right">
    <div class="ptb-progress">
      <div class="ptb-progress-bar"><div class="ptb-progress-fill" id="ptb-fill" style="width:0%"></div></div>
      <span id="ptb-pct">0%</span> complete
    </div>
  </div>
</header>

<!-- Main layout -->
<div class="player-layout">

  <!-- Left: Video + info -->
  <div class="video-panel">

    <!-- Video area -->
    <div class="video-area">
      <div class="video-ratio">
        <!-- YouTube iframe — replaced with real unlisted video ID -->
        <div class="video-placeholder" id="video-placeholder">
          <div class="video-placeholder-icon">🎬</div>
          <h3>This class is being prepared.</h3>
          <p>Your module video will appear here once it has been uploaded by the faculty. All recorded lessons and live session replays are delivered through this player.</p>
        </div>
        <!-- When a YouTube ID is available, this iframe replaces the placeholder -->
        <iframe
          id="video-iframe"
          class="video-iframe"
          style="display:none"
          src=""
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <!-- Video info + controls -->
    <div class="video-info">

      <!-- Class selector (for modules with >1 class) -->
      <div class="vi-classes-row" id="class-selector">
        <!-- Injected by JS -->
      </div>

      <div class="vi-module-title" id="vi-title">Loading…</div>
      <div class="vi-meta">
        <span class="vi-meta-item" id="vi-prog"><i class="fas fa-graduation-cap"></i> …</span>
        <span class="vi-meta-item" id="vi-week"><i class="fas fa-calendar"></i> …</span>
        <span class="vi-meta-item" id="vi-duration"><i class="fas fa-clock"></i> …</span>
      </div>
      <div class="vi-desc" id="vi-desc">…</div>

      <div class="vi-actions">
        <button class="vi-btn vi-btn-primary" id="mark-watched-btn" onclick="markWatched()">
          <i class="fas fa-check"></i> Mark as Watched
        </button>
        <button class="vi-btn vi-btn-outline" id="prev-btn" onclick="goModule(-1)">
          <i class="fas fa-chevron-left"></i> Previous
        </button>
        <button class="vi-btn vi-btn-outline" id="next-btn" onclick="goModule(1)">
          Next <i class="fas fa-chevron-right"></i>
        </button>
      </div>

      <!-- Personal notes -->
      <div class="vi-notes-wrap">
        <div class="vi-notes-label">My Notes — <span style="font-style:italic;font-weight:400">saved in your browser</span></div>
        <textarea class="vi-notes" id="vi-notes" placeholder="Jot down what struck you, questions to bring to your tutor call, or insights to revisit…"></textarea>
        <button class="vi-notes-save" onclick="saveNote()"><i class="fas fa-save"></i> Save note</button>
      </div>

    </div>
  </div><!-- /video-panel -->

  <!-- Right: Module list sidebar -->
  <div class="module-sidebar">
    <div class="ms-header">
      <div class="ms-prog-name" id="ms-prog-name">Programme</div>
      <div class="ms-title" id="ms-title">Module List</div>
      <div class="ms-progress">
        <div class="ms-progress-bar"><div class="ms-progress-fill" id="ms-prog-fill" style="width:0%"></div></div>
        <div class="ms-progress-pct" id="ms-prog-pct">0%</div>
      </div>
    </div>
    <div class="ms-list" id="ms-list">
      <!-- Injected by JS -->
    </div>
  </div>

</div><!-- /player-layout -->

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
// ── DEMO DATA (mirrors dashboard.html — replace with Supabase query) ──
var DEMO_MODULES={
  numerology:{
    prog_name:'Sacred Mathematics',
    prog_icon:'🔢',
    progress_pct:18,
    weeks:[
      {label:'Week 1',items:[
        {id:'n-w1-1',week:'Week 1',title:'Foundations: Numbers & the Human Blueprint',desc:'Core theory, historical lineage, and the KAYAL cross-validation methodology.',status:'watched',duration:'48 min',classes:[
          {label:'Class 1',youtube_id:'',title:'Foundations — Full Lesson'}
        ]}
      ]},
      {label:'Week 2',items:[
        {id:'n-w2-1',week:'Week 2',title:'The Life Path: Your Primary Number',desc:'Calculating and interpreting Life Path numbers 1–9, 11, 22, and 33.',status:'available',is_new:true,duration:'52 min',classes:[
          {label:'Class 1',youtube_id:'',title:'Life Path — Full Lesson'}
        ]},
        {id:'n-w2-2',week:'Week 2',title:'Master Numbers Deep Dive',desc:'Understanding the amplified vibration of 11, 22, and 33.',status:'available',duration:'31 min',classes:[
          {label:'Class 1',youtube_id:'',title:'Master Numbers — Full Lesson'}
        ]}
      ]},
      {label:'Week 3',items:[
        {id:'n-w3-1',week:'Week 3',title:'Expression Number & Soul Urge',desc:'Decoding the name to reveal Expression, Soul Urge, and Personality numbers.',status:'locked',duration:'65 min',classes:[
          {label:'Class 1',youtube_id:'',title:'Expression Number'},
          {label:'Class 2',youtube_id:'',title:'Soul Urge & Personality Deep Dive'}
        ]}
      ]},
      {label:'Week 4 — 12',items:[
        {id:'n-w4-1',week:'Week 4',title:'The Four Pinnacle Cycles',desc:'Mapping the four major life chapters.',status:'locked',duration:'44 min',classes:[{label:'Class 1',youtube_id:'',title:'Pinnacle Cycles — Full Lesson'}]},
        {id:'n-w5-1',week:'Week 5',title:'Personal Year Cycles',desc:'The nine-year cycle system.',status:'locked',duration:'—',classes:[{label:'Class 1',youtube_id:'',title:'Personal Year Cycles'}]},
        {id:'n-w12-1',week:'Week 12',title:'Final Project & Certification',desc:'Submit your complete reading for assessment.',status:'locked',duration:'—',classes:[{label:'Class 1',youtube_id:'',title:'Final Project'}]}
      ]}
    ]
  },
  astrology:{
    prog_name:'Celestial Mapping',
    prog_icon:'♈',
    progress_pct:8,
    weeks:[
      {label:'Week 1',items:[
        {id:'a-w1-1',week:'Week 1',title:'The Sky Map: Structure & History',desc:'An introduction to the celestial map and the KAYAL methodology.',status:'watched',duration:'55 min',classes:[
          {label:'Class 1',youtube_id:'',title:'Sky Map Foundations'}
        ]}
      ]},
      {label:'Week 2',items:[
        {id:'a-w2-1',week:'Week 2',title:'Planets, Signs & Their Meanings',desc:'The ten planets, twelve signs, and core correspondences.',status:'available',is_new:true,duration:'—',classes:[
          {label:'Class 1',youtube_id:'',title:'Planets & Signs'}
        ]}
      ]},
      {label:'Week 3 — 14',items:[
        {id:'a-w3-1',week:'Week 3',title:'The Twelve Houses',desc:'House systems, rulers, and what each house governs.',status:'locked',duration:'—',classes:[{label:'Class 1',youtube_id:'',title:'Houses I'},{label:'Class 2',youtube_id:'',title:'Houses II'}]},
        {id:'a-w14-1',week:'Week 14',title:'Final Project & Certification',desc:'Submit your complete sky map reading.',status:'locked',duration:'—',classes:[{label:'Class 1',youtube_id:'',title:'Final Project'}]}
      ]}
    ]
  }
};

// ── STATE ──────────────────────────────────────────────────────
var state={prog:null,module:null,classIdx:0,progData:null,allModules:[],watchedModules:new Set()};

// ── INIT ────────────────────────────────────────────────────────
window.addEventListener('load',function(){
  // Check auth
  if(!sessionStorage.getItem('kayal_student')){window.location.href='login.html';return;}

  // Parse URL params
  var params=new URLSearchParams(window.location.search);
  state.prog=params.get('prog')||'numerology';
  var moduleId=params.get('module');

  // Load watched state from localStorage
  try{var w=JSON.parse(localStorage.getItem('kayal_watched_'+state.prog)||'[]');state.watchedModules=new Set(w);}catch(e){}

  // Load programme data
  state.progData=DEMO_MODULES[state.prog];
  if(!state.progData){window.location.href='dashboard.html';return;}

  // Flatten all modules
  state.allModules=[];
  state.progData.weeks.forEach(function(w){w.items.forEach(function(m){state.allModules.push(m);});});

  // Find target module
  var targetIdx=0;
  if(moduleId){targetIdx=state.allModules.findIndex(function(m){return m.id===moduleId;});}
  if(targetIdx<0)targetIdx=0;
  state.module=targetIdx;

  renderSidebar();
  loadModule(targetIdx);
  loadNote();
});

function loadModule(idx){
  if(idx<0||idx>=state.allModules.length)return;
  state.module=idx;
  state.classIdx=0;
  var mod=state.allModules[idx];

  // Update URL without reload
  var url=new URL(window.location);
  url.searchParams.set('prog',state.prog);
  url.searchParams.set('module',mod.id);
  window.history.replaceState({},'',url);

  // Topbar
  document.getElementById('ptb-prog-name').textContent=state.progData.prog_icon+' '+state.progData.prog_name;
  document.getElementById('ptb-module-name').textContent=mod.title;

  // Progress
  var watched=state.watchedModules.size;
  var total=state.allModules.length;
  var pct=Math.round((watched/total)*100);
  document.getElementById('ptb-fill').style.width=pct+'%';
  document.getElementById('ptb-pct').textContent=pct+'%';
  document.getElementById('ms-prog-fill').style.width=state.progData.progress_pct+'%';
  document.getElementById('ms-prog-pct').textContent=state.progData.progress_pct+'%';

  // Info panel
  document.getElementById('vi-title').textContent=mod.title;
  document.getElementById('vi-prog').innerHTML='<i class="fas fa-graduation-cap"></i> '+state.progData.prog_icon+' '+state.progData.prog_name;
  document.getElementById('vi-week').innerHTML='<i class="fas fa-calendar"></i> '+mod.week;
  document.getElementById('vi-duration').innerHTML='<i class="fas fa-clock"></i> '+(mod.duration||'—');
  document.getElementById('vi-desc').textContent=mod.desc;

  // Mark watched button
  var isWatched=state.watchedModules.has(mod.id)||mod.status==='watched';
  var btn=document.getElementById('mark-watched-btn');
  if(isWatched){btn.className='vi-btn vi-btn-watched';btn.innerHTML='<i class="fas fa-check-circle"></i> Watched';}
  else if(mod.status==='locked'){btn.className='vi-btn vi-btn-outline';btn.innerHTML='<i class="fas fa-lock"></i> Locked';btn.disabled=true;}
  else{btn.className='vi-btn vi-btn-primary';btn.innerHTML='<i class="fas fa-check"></i> Mark as Watched';btn.disabled=false;}

  // Prev/Next
  document.getElementById('prev-btn').disabled=idx===0;
  document.getElementById('next-btn').disabled=idx===state.allModules.length-1;

  // Class selector
  renderClassSelector(mod);

  // Video
  loadClass(mod,0);

  // Sidebar active state
  renderSidebar();

  // Notes
  loadNote();

  // Sidebar header
  document.getElementById('ms-prog-name').textContent=state.progData.prog_name;
  document.getElementById('ms-title').textContent=mod.title.length>40?mod.title.substring(0,40)+'…':mod.title;
}

function renderClassSelector(mod){
  var sel=document.getElementById('class-selector');
  sel.innerHTML='';
  if(mod.classes.length<=1){sel.style.display='none';return;}
  sel.style.display='flex';
  mod.classes.forEach(function(cls,i){
    var btn=document.createElement('button');
    btn.className='vi-class-btn'+(i===state.classIdx?' active':'')+(state.watchedModules.has(mod.id+'-c'+i)?' watched-done':'');
    btn.textContent=cls.label+(state.watchedModules.has(mod.id+'-c'+i)?' ✓':'');
    btn.onclick=function(){state.classIdx=i;renderClassSelector(mod);loadClass(mod,i);};
    sel.appendChild(btn);
  });
}

function loadClass(mod,classIdx){
  var cls=mod.classes[classIdx];
  var iframe=document.getElementById('video-iframe');
  var placeholder=document.getElementById('video-placeholder');
  if(cls&&cls.youtube_id){
    iframe.src='https://www.youtube.com/embed/'+cls.youtube_id+'?rel=0&modestbranding=1';
    iframe.style.display='block';
    placeholder.style.display='none';
  }else{
    iframe.style.display='none';
    iframe.src='';
    placeholder.style.display='flex';
  }
}

function markWatched(){
  var mod=state.allModules[state.module];
  if(!mod||mod.status==='locked')return;
  state.watchedModules.add(mod.id);
  // Persist
  try{localStorage.setItem('kayal_watched_'+state.prog,JSON.stringify([...state.watchedModules]));}catch(e){}
  // Update button
  var btn=document.getElementById('mark-watched-btn');
  btn.className='vi-btn vi-btn-watched';
  btn.innerHTML='<i class="fas fa-check-circle"></i> Watched';
  showToast('Progress saved — well done.');
  renderSidebar();
  // Auto-advance to next available after a brief delay
  setTimeout(function(){
    var next=state.allModules.find(function(m,i){return i>state.module&&m.status!=='locked'&&!state.watchedModules.has(m.id);});
    if(next){
      var nextIdx=state.allModules.indexOf(next);
      goModule(nextIdx-state.module);
    }
  },1800);
}

function goModule(delta){
  var newIdx=state.module+delta;
  if(newIdx<0||newIdx>=state.allModules.length)return;
  if(delta>1){loadModule(newIdx);}
  else{loadModule(newIdx);}
}

function renderSidebar(){
  var list=document.getElementById('ms-list');
  var html='';
  state.progData.weeks.forEach(function(wk){
    html+='<div class="ms-week-label">'+wk.label+'</div>';
    wk.items.forEach(function(mod,i){
      var isActive=state.allModules.indexOf(mod)===state.module;
      var isWatched=state.watchedModules.has(mod.id)||mod.status==='watched';
      var dotClass=isWatched?'watched':mod.status==='available'?'available':mod.is_new?'new':'locked';
      var dotIcon=isWatched?'<i class="fas fa-check"></i>':mod.status==='locked'?'<i class="fas fa-lock"></i>':'<i class="fas fa-play"></i>';
      var classCount=mod.classes.length;
      html+=
        '<div class="ms-module '+(mod.status==='locked'?'locked':'')+' '+(isActive?'active-module':'')+'" '+
          (mod.status!=='locked'?'onclick="loadModule('+state.allModules.indexOf(mod)+')"':'')+'>'+
          '<div class="ms-dot '+dotClass+'">'+dotIcon+'</div>'+
          '<div class="ms-module-body">'+
            '<div class="ms-module-title">'+mod.title+(mod.is_new&&!isWatched?'<span class="ms-module-new">New</span>':'')+'</div>'+
            '<div class="ms-module-meta">'+classCount+' class'+(classCount>1?'es':'')+(mod.duration&&mod.duration!=='—'?' · '+mod.duration:'')+'</div>'+
          '</div>'+
        '</div>';
    });
  });
  list.innerHTML=html;
}

function saveNote(){
  var mod=state.allModules[state.module];
  if(!mod)return;
  var notes=document.getElementById('vi-notes').value;
  try{localStorage.setItem('kayal_note_'+state.prog+'_'+mod.id,notes);}catch(e){}
  showToast('Note saved.');
}

function loadNote(){
  var mod=state.allModules[state.module];
  if(!mod)return;
  try{
    var n=localStorage.getItem('kayal_note_'+state.prog+'_'+mod.id)||'';
    document.getElementById('vi-notes').value=n;
  }catch(e){}
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2400);
}

// Auto-save notes on blur
document.addEventListener('focusout',function(e){if(e.target.id==='vi-notes')saveNote();});
</script>
</body>
</html>
